version: '3.8'

services:
  ace-step-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ace-step-backend
    ports:
      - "8001:8001"
    volumes:
      - ./data:/app/ACE-Step-1.5/data
      - ./models:/app/ACE-Step-1.5/models
    environment:
      - SYCL_CACHE_PERSISTENT=1
      - SYCL_PI_LEVEL_ZERO_USE_IMMEDIATE_COMMANDLISTS=1
      - PYTORCH_DEVICE=xpu
      - TORCH_COMPILE_BACKEND=eager
      - TOKENIZERS_PARALLELISM=false
      - TORCHAUDIO_USE_BACKEND=ffmpeg
      - HOST=0.0.0.0
      - PORT=8001
    # For Intel XPU GPU access  
    devices:
      - /dev/dri:/dev/dri
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    # Additional environment for better GPU support
    environment:
      - OMP_NUM_THREADS=4
      - MKL_NUM_THREADS=4

  ace-step-ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    container_name: ace-step-ui
    ports:
      - "3000:3000"
    environment:
      - ACESTEP_API_URL=http://ace-step-backend:8001
      - PORT=3000
      - NODE_ENV=production
      - DATABASE_PATH=./server/data/acestep.db
    depends_on:
      ace-step-backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3