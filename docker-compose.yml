version: '3.8'

services:
  acestep-api:
    build:
      context: ../ACE-Step-1.5
      dockerfile: Dockerfile
    container_name: acestep-api
    ports:
      - "8001:8001"
    volumes:
      - ../ACE-Step-1.5:/app
      - ./models:/app/checkpoints
      - ./data:/app/data
    environment:
      - HOST=0.0.0.0
      - PORT=8001
      - ACESTEP_INIT_LLM=auto
      - ACESTEP_NO_INIT=false
    command: ["sh", "-c", "cd /app && uv run acestep --port 8001 --enable-api --backend pt --server-name 0.0.0.0"]
    restart: unless-stopped
    networks:
      - acestep-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/docs"]
      interval: 30s
      timeout: 10s
      retries: 3

  acestep-ui:
    build:
      context: ../ace-step-ui
      dockerfile: Dockerfile
    container_name: acestep-ui
    ports:
      - "3000:3000"
    volumes:
      - ../ace-step-ui:/app
      - ./ui-data:/app/data
    environment:
      - PORT=3000
      - NODE_ENV=production
      - ACESTEP_API_URL=http://acestep-api:8001
      - DATABASE_PATH=/app/data/acestep.db
      - AUDIO_DIR=/app/public/audio
      - FRONTEND_URL=http://localhost:3000
      - VITE_API_URL=http://localhost:3000
      - JWT_SECRET=ace-step-ui-secret
    depends_on:
      acestep-api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - acestep-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  acestep-network:
    driver: bridge